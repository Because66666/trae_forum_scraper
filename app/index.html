<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f6eadb">
  <link rel="preconnect" href="https://code.iconify.design">
  <title>Project Drift · TRAE Demo Feed</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay" aria-label="加载中">
    <div class="loading-content">
      <div class="loading-icon">
        <svg viewBox="0 0 60 60" width="60" height="60" fill="none">
          <circle cx="30" cy="30" r="26" stroke="rgba(216,135,69,0.2)" stroke-width="3"/>
          <circle class="loading-ring" cx="30" cy="30" r="26" stroke="#d88745" stroke-width="3"
            stroke-linecap="round" stroke-dasharray="163.36" stroke-dashoffset="130"
            transform="rotate(-90 30 30)"/>
          <path class="loading-drift" d="M18 34c3-6 8-4 12-2s9 4 12-2" stroke="#d88745" stroke-width="2.2"
            stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <p class="loading-title">灵感洋流</p>
      <p class="loading-sub">正在汇聚创意作品…</p>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar" style="width:0%"></div>
      </div>
      <p id="progressText" class="progress-text">0 / 0</p>
    </div>
  </div>

  <a class="skip-link" href="#feed">跳到项目内容</a>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <main class="shell">
    <section class="phone-frame" aria-label="项目推荐流">
      <div class="topbar">
        <button id="resetBtn" class="icon-btn ghost-btn" type="button" aria-label="重置偏好" title="重置偏好">
          <iconify-icon icon="line-md:rotate-270" aria-hidden="true"></iconify-icon>
        </button>
      </div>
      <div id="feed" class="feed" tabindex="0" aria-live="polite"></div>
      <div class="bottom-actions">
        <button id="prevBtn" class="icon-btn nav-btn" type="button" aria-label="上一条" title="上一条">
          <iconify-icon icon="line-md:arrow-up" aria-hidden="true"></iconify-icon>
        </button>
        <button id="nextBtn" class="icon-btn nav-btn primary" type="button" aria-label="下一条" title="下一条">
          <iconify-icon icon="line-md:arrow-down" aria-hidden="true"></iconify-icon>
        </button>
      </div>
    </section>
  </main>

  <template id="postTemplate">
    <article class="post-card">
      <div class="image-stage"></div>
      <div class="scrim"></div>
      <div class="content-stack">
        <div class="tag-row"></div>
        <h2></h2>
        <p class="meta"></p>
        <p class="summary"></p>
        <div class="stat-row"></div>
      </div>
      <div class="action-rail">
        <a class="open-link icon-btn" target="_blank" rel="noopener noreferrer" aria-label="查看详情" title="查看详情">
          <iconify-icon icon="line-md:external-link" aria-hidden="true"></iconify-icon>
        </a>
        <button class="interest-btn icon-btn" type="button" aria-label="喜欢" title="喜欢">
          <iconify-icon icon="line-md:heart-filled" aria-hidden="true"></iconify-icon>
        </button>
      </div>
    </article>
  </template>

  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
